version: "3.9"

services:
  expense-classifier:
    build: .
    container_name: expense-classifier
    ports:
      - "8501:8501"
    volumes:
      # Mount data and outputs so they persist across container restarts
      - ./data/raw:/app/data/raw:ro
      - ./outputs:/app/outputs
    environment:
      - PROJECT_ROOT=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
